    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-165E4FVGFM"></script>
    <script>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-165E4FVGFM');

    <script>
      // Apply dark mode immediately before React loads to prevent flash
      try {
        var saved = localStorage.getItem('darkMode');
        var isDark = saved ? JSON.parse(saved) : true;
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
